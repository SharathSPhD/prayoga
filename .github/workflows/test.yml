name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Check aggregate mirrors
        run: python scripts/export_aggregates.py --check

      - name: Check plugin manifest
        run: python scripts/check_plugin_manifest.py

      - name: Check paper sources
        run: python scripts/check_paper_sources.py

      - name: Ruff critical checks
        run: ruff check --select E9,F63,F7,F82 src tests scripts

      - name: Pytest
        run: python -m pytest
